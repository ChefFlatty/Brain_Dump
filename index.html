<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Brain Dump</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; }
    textarea, input, button { font-family: 'DM Mono', 'Courier New', monospace; }
    textarea:focus, input:focus { outline: none; }
    .note-row:hover .del-btn { opacity: 1 !important; }
    .action-item { transition: background 0.15s; }
    .action-item:hover { background: rgba(255,255,255,0.04) !important; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastIn {
      0%   { opacity: 0; transform: translateX(20px); }
      15%  { opacity: 1; transform: translateX(0); }
      85%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .note-new { animation: slideIn 0.2s ease; }
    .toast    { animation: toastIn 2.2s ease forwards; }
    .pulse    { animation: pulse 1.4s ease-in-out infinite; display:inline-block; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NOTES_KEY   = "braindump-notes";
const ACTIONS_KEY = "braindump-actions";
const APIKEY_KEY  = "braindump-apikey";

const fmt = (iso) => new Date(iso).toLocaleString("en-US", {
  month: "short", day: "numeric", hour: "numeric", minute: "2-digit", hour12: true
});

const COLOR = {
  red:    { bg:"#2a1010", border:"#c0392b", dot:"#e74c3c" },
  amber:  { bg:"#2a1f08", border:"#d68910", dot:"#f39c12" },
  green:  { bg:"#0d2318", border:"#1e8449", dot:"#27ae60" },
  blue:   { bg:"#0d1a2a", border:"#1a5276", dot:"#2980b9" },
  purple: { bg:"#1a0d2a", border:"#6c3483", dot:"#8e44ad" },
  slate:  { bg:"#141a20", border:"#2c3e50", dot:"#566573" },
};

function App() {
  const [notes,   setNotes]   = useState([]);
  const [actions, setActions] = useState(null);
  const [input,   setInput]   = useState("");
  const [loading, setLoading] = useState(false);
  const [view,    setView]    = useState("notes");
  const [toast,   setToast]   = useState(null);
  const [apiKey,  setApiKey]  = useState("");
  const [showKey, setShowKey] = useState(false);
  const inputRef = useRef(null);

  // Load from localStorage on mount
  useEffect(() => {
    try { const n = localStorage.getItem(NOTES_KEY);   if (n) setNotes(JSON.parse(n)); } catch(_){}
    try { const a = localStorage.getItem(ACTIONS_KEY); if (a) setActions(JSON.parse(a)); } catch(_){}
    try { const k = localStorage.getItem(APIKEY_KEY);  if (k) setApiKey(k); } catch(_){}
  }, []);

  const saveKey = (k) => {
    setApiKey(k);
    localStorage.setItem(APIKEY_KEY, k);
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const saveNote = () => {
    const text = input.trim();
    if (!text) return;
    const newNote = { id: Date.now(), text, ts: new Date().toISOString() };
    const updated = [newNote, ...notes];
    setNotes(updated);
    localStorage.setItem(NOTES_KEY, JSON.stringify(updated));
    setInput("");
    showToast("Saved.");
    inputRef.current?.focus();
  };

  const deleteNote = (id) => {
    const updated = notes.filter(n => n.id !== id);
    setNotes(updated);
    localStorage.setItem(NOTES_KEY, JSON.stringify(updated));
  };

  const clearAll = () => {
    setNotes([]);
    setActions(null);
    localStorage.removeItem(NOTES_KEY);
    localStorage.removeItem(ACTIONS_KEY);
    showToast("Cleared.");
  };

  const organizeNotes = async () => {
    if (!notes.length) return;
    if (!apiKey.trim()) { setShowKey(true); showToast("Add your API key first."); return; }
    setLoading(true);
    setView("actions");
    const dump = notes.map((n, i) => `${i+1}. ${n.text}`).join("\n");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `You are a ruthlessly efficient personal assistant.
The user dumps raw voice notes — fragments, reminders, half-thoughts.
Your job: transform them into clean, grouped action steps.

Return ONLY valid JSON, no markdown, no preamble. Schema:
{
  "groups": [
    {
      "label": "Category name (short, 1-3 words)",
      "color": "one of: red | amber | green | blue | purple | slate",
      "actions": ["Action item 1", "Action item 2"]
    }
  ]
}

Rules:
- Group by theme/domain (e.g. Admin, Teaching, Personal, Groceries, Follow Up)
- Each action is a clear verb-first imperative
- Collapse redundant notes
- Preserve urgency when implied
- 1-6 groups max`,
          messages: [{ role: "user", content: `Here are my raw notes:\n\n${dump}` }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content.map(b => b.text || "").join("");
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      setActions(parsed);
      localStorage.setItem(ACTIONS_KEY, JSON.stringify(parsed));
    } catch(e) {
      setActions({ error: e.message || true });
    }
    setLoading(false);
  };

  const S = {
    wrap: { minHeight:"100vh", background:"#0a0a0a", fontFamily:"'DM Mono','Courier New',monospace", color:"#e8e8e8", display:"flex", flexDirection:"column" },
    header: { borderBottom:"1px solid #1e1e1e", padding:"20px 24px 16px", display:"flex", alignItems:"flex-end", justifyContent:"space-between" },
    title: { fontFamily:"'Bebas Neue',sans-serif", fontSize:32, letterSpacing:3, color:"#f5f5f5", lineHeight:1 },
    subtitle: { fontSize:11, color:"#555", letterSpacing:1, marginTop:4 },
    tabBtn: (active) => ({ background: active?"#1e1e1e":"transparent", border:`1px solid ${active?"#444":"#222"}`, color: active?"#f5f5f5":"#555", padding:"6px 14px", borderRadius:4, fontSize:11, letterSpacing:1.5, cursor:"pointer", textTransform:"uppercase" }),
    capture: { padding:"16px 24px", borderBottom:"1px solid #1a1a1a", background:"#0d0d0d" },
    textarea: { flex:1, background:"#141414", border:"1px solid #2a2a2a", borderRadius:6, color:"#f0f0f0", fontSize:14, padding:"10px 14px", resize:"none", fontFamily:"inherit", lineHeight:1.5 },
    saveBtn: { background:"#e8e8e8", color:"#0a0a0a", border:"none", borderRadius:6, padding:"10px 18px", fontSize:13, fontWeight:500, cursor:"pointer", letterSpacing:1, fontFamily:"inherit", height:56 },
    organizeBtn: (loading) => ({ background:"transparent", border:"1px solid #333", color:loading?"#555":"#aaa", fontSize:11, letterSpacing:1.5, padding:"5px 14px", borderRadius:4, cursor:loading?"not-allowed":"pointer", fontFamily:"inherit" }),
    content: { flex:1, overflow:"auto", padding:"16px 24px" },
    empty: { textAlign:"center", color:"#2a2a2a", marginTop:60 },
    noteRow: { background:"#111", border:"1px solid #1e1e1e", borderRadius:6, padding:"12px 14px", display:"flex", gap:12, alignItems:"flex-start", position:"relative" },
    noteTs: { fontSize:10, color:"#3a3a3a", letterSpacing:1, paddingTop:2, minWidth:70 },
    noteText: { flex:1, fontSize:13, lineHeight:1.6, color:"#d0d0d0" },
    delBtn: { background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:14, opacity:0, transition:"opacity 0.15s", padding:"0 4px" },
    clearBtn: { background:"none", border:"1px dashed #1e1e1e", color:"#333", fontSize:11, letterSpacing:1.5, padding:"10px", borderRadius:6, cursor:"pointer", marginTop:8, fontFamily:"inherit", width:"100%" },
    keyArea: { marginTop:12, display:"flex", gap:8, alignItems:"center" },
    keyInput: { flex:1, background:"#141414", border:"1px solid #2a2a2a", borderRadius:4, color:"#aaa", fontSize:11, padding:"7px 10px", fontFamily:"inherit" },
    keyBtn: { background:"#1e1e1e", border:"1px solid #333", color:"#aaa", fontSize:11, padding:"7px 12px", borderRadius:4, cursor:"pointer", fontFamily:"inherit" },
    toast: { position:"fixed", bottom:24, right:24, background:"#1e1e1e", border:"1px solid #333", color:"#aaa", fontSize:12, letterSpacing:1.5, padding:"10px 18px", borderRadius:6 },
  };

  return (
    <div style={S.wrap}>
      {/* Header */}
      <div style={S.header}>
        <div>
          <div style={S.title}>BRAIN DUMP</div>
          <div style={S.subtitle}>{notes.length} NOTE{notes.length!==1?"S":""} CAPTURED</div>
        </div>
        <div style={{display:"flex", gap:8}}>
          {["notes","actions"].map(v => (
            <button key={v} style={S.tabBtn(view===v)} onClick={()=>setView(v)}>
              {v==="actions"?"⚡ Actions":"📋 Notes"}
            </button>
          ))}
          <button style={S.tabBtn(false)} onClick={()=>setShowKey(s=>!s)} title="API Key">🔑</button>
        </div>
      </div>

      {/* API Key panel */}
      {showKey && (
        <div style={{padding:"12px 24px", borderBottom:"1px solid #1a1a1a", background:"#0d0d0d"}}>
          <div style={{fontSize:11, color:"#555", letterSpacing:1, marginBottom:6}}>
            ANTHROPIC API KEY — stored locally on your device only
          </div>
          <div style={S.keyArea}>
            <input
              type="password"
              value={apiKey}
              onChange={e=>saveKey(e.target.value)}
              placeholder="sk-ant-..."
              style={S.keyInput}
            />
            <button style={S.keyBtn} onClick={()=>setShowKey(false)}>DONE</button>
          </div>
          <div style={{fontSize:10, color:"#333", marginTop:6}}>
            Get yours at console.anthropic.com → API Keys
          </div>
        </div>
      )}

      {/* Capture bar */}
      <div style={S.capture}>
        <div style={{display:"flex", gap:10, alignItems:"flex-end"}}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();saveNote();} }}
            placeholder="Dump it here. Enter to save."
            rows={2}
            style={S.textarea}
          />
          <button onClick={saveNote} style={S.saveBtn}>SAVE</button>
        </div>
        <div style={{marginTop:8, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <span style={{fontSize:10, color:"#3a3a3a", letterSpacing:1}}>
            Hey Siri → dictate → paste here
          </span>
          {notes.length > 0 && (
            <button onClick={organizeNotes} style={S.organizeBtn(loading)} disabled={loading}>
              {loading ? <span className="pulse">ORGANIZING…</span> : "⚡ ORGANIZE INTO ACTIONS"}
            </button>
          )}
        </div>
      </div>

      {/* Content */}
      <div style={S.content}>

        {/* NOTES */}
        {view==="notes" && (
          <div>
            {notes.length===0 ? (
              <div style={S.empty}>
                <div style={{fontSize:48}}>🎙️</div>
                <div style={{marginTop:12, fontSize:13, letterSpacing:1}}>NO NOTES YET</div>
                <div style={{fontSize:11, color:"#222", marginTop:6}}>Start dumping thoughts above</div>
              </div>
            ) : (
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                {notes.map((n,i) => (
                  <div key={n.id} className={`note-row${i===0?" note-new":""}`} style={S.noteRow}>
                    <div style={S.noteTs}>{fmt(n.ts)}</div>
                    <div style={S.noteText}>{n.text}</div>
                    <button className="del-btn" style={S.delBtn} onClick={()=>deleteNote(n.id)}>✕</button>
                  </div>
                ))}
                <button style={S.clearBtn} onClick={clearAll}>CLEAR ALL NOTES</button>
              </div>
            )}
          </div>
        )}

        {/* ACTIONS */}
        {view==="actions" && (
          <div>
            {!actions && !loading && (
              <div style={S.empty}>
                <div style={{fontSize:48}}>⚡</div>
                <div style={{marginTop:12, fontSize:13, letterSpacing:1}}>NO ACTIONS YET</div>
                <div style={{fontSize:11, color:"#222", marginTop:6}}>Add notes then hit Organize</div>
              </div>
            )}
            {loading && (
              <div style={{textAlign:"center", color:"#444", marginTop:60}}>
                <div className="pulse" style={{fontSize:48}}>⚡</div>
                <div style={{marginTop:16, fontSize:12, letterSpacing:2}}>ANALYZING {notes.length} NOTES…</div>
              </div>
            )}
            {actions && !loading && !actions.error && (
              <div style={{display:"flex", flexDirection:"column", gap:14}}>
                {actions.groups?.map((g, gi) => {
                  const c = COLOR[g.color] || COLOR.slate;
                  return (
                    <div key={gi} style={{background:c.bg, border:`1px solid ${c.border}`, borderRadius:8, overflow:"hidden", animation:`slideIn 0.25s ease ${gi*0.07}s both`}}>
                      <div style={{padding:"10px 16px", borderBottom:`1px solid ${c.border}`, display:"flex", alignItems:"center", gap:10}}>
                        <div style={{width:8, height:8, borderRadius:"50%", background:c.dot}} />
                        <span style={{fontSize:11, letterSpacing:2, fontWeight:500, color:c.dot}}>{g.label.toUpperCase()}</span>
                        <span style={{marginLeft:"auto", fontSize:10, color:"#444"}}>{g.actions.length} item{g.actions.length!==1?"s":""}</span>
                      </div>
                      <div style={{padding:"8px 0"}}>
                        {g.actions.map((a,ai) => (
                          <div key={ai} className="action-item" style={{padding:"9px 16px", display:"flex", gap:12, alignItems:"flex-start", borderRadius:4, margin:"0 6px"}}>
                            <span style={{color:c.dot, fontSize:12, paddingTop:2}}>→</span>
                            <span style={{fontSize:13, lineHeight:1.5, color:"#d8d8d8"}}>{a}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
                <button style={{...S.clearBtn, borderColor:"#1e1e1e"}} onClick={()=>{setView("notes");}}>← BACK TO NOTES</button>
              </div>
            )}
            {actions?.error && (
              <div style={{color:"#c0392b", fontSize:13, textAlign:"center", marginTop:60, lineHeight:1.8}}>
                Something went wrong.<br/>
                <span style={{fontSize:11, color:"#555"}}>{typeof actions.error==="string"?actions.error:"Check your API key."}</span>
              </div>
            )}
          </div>
        )}
      </div>

      {toast && <div className="toast" style={S.toast}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
